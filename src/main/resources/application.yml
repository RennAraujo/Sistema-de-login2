server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: iam-portfolio
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:iam_portfolio}
    username: ${POSTGRES_USER:iam}
    password: ${POSTGRES_PASSWORD:iam}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_MS:86400000}

cors:
  allowed:
    origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}

app:
  2fa:
    issuer: ${APP_2FA_ISSUER:Sistema Login Seguro}
    app-name: ${APP_2FA_APP_NAME:LoginSeguro}
  identity:
    # When true, new self-registered users start as PENDING_APPROVAL and
    # cannot log in until an admin approves them via /api/identity/users/{id}/approve.
    require-approval: ${APP_IDENTITY_REQUIRE_APPROVAL:false}
  oauth2:
    # OIDC issuer URI advertised in /.well-known/openid-configuration.
    # Behind a reverse proxy this MUST match the public URL clients see.
    issuer-uri: ${APP_OAUTH2_ISSUER_URI:http://localhost:8080}
  connector:
    # External SCIM connector (Python FastAPI in scim-connector/).
    # When the IdP reaches the connector through Docker the URL is
    # http://scim-connector:9000; on the host it's http://localhost:9000.
    base-url: ${APP_CONNECTOR_BASE_URL:http://localhost:9000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.iamportfolio
  show-actuator: false

logging:
  level:
    com.iamportfolio: INFO
    org.springframework.security: INFO
    org.flywaydb: INFO
