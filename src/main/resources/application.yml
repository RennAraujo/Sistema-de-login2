server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: Sistema Login Seguro
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:iam_portfolio}
    username: ${POSTGRES_USER:iam}
    password: ${POSTGRES_PASSWORD:iam}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_MS:86400000}

cors:
  allowed:
    origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}

app:
  2fa:
    issuer: ${APP_2FA_ISSUER:Sistema Login Seguro}
    app-name: ${APP_2FA_APP_NAME:LoginSeguro}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.login.controller
  show-actuator: false

logging:
  level:
    com.login: INFO
    org.springframework.security: INFO
    org.flywaydb: INFO
