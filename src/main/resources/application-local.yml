# Local development overrides.
# Provides safe fallbacks so `mvn spring-boot:run` works without exporting env vars.
# Real environments (docker, prod) MUST supply JWT_SECRET via .env / orchestrator.

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:iam_portfolio}
    username: ${POSTGRES_USER:iam}
    password: ${POSTGRES_PASSWORD:iam}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:localDevelopmentSecretChangeMeInProductionAtLeast32Chars!}
  expiration: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.login: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
