# Configurações do Servidor
server.port=8080
spring.application.name=Sistema Login Seguro

# Configurações do Banco H2
spring.datasource.url=jdbc:h2:mem:logindb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configurações JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Configurações JWT
jwt.secret=sistemaLoginSeguro2024ChaveSecretaMuitoLongaESegura123456789
jwt.expiration=86400000

# Configurações de Segurança CORS
cors.allowed.origins=http://localhost:8080,http://127.0.0.1:8080

# Logging
logging.level.com.login=DEBUG
logging.level.org.springframework.security=DEBUG

# 2FA Settings
app.2fa.issuer=Sistema Login Seguro
app.2fa.app-name=LoginSeguro

# Swagger/OpenAPI Settings
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.packages-to-scan=com.login.controller
springdoc.show-actuator=false 