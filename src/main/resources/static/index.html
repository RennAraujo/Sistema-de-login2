<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAM Portfolio</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <h1>IAM Portfolio</h1>
            </div>
            <div class="header-actions" id="headerActions"></div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Login/Register Forms -->
            <div id="authSection" class="auth-section">
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">
                        <i class="fas fa-sign-in-alt"></i>
                        Login
                    </button>
                    <button class="tab-btn" data-tab="register">
                        <i class="fas fa-user-plus"></i>
                        Registro
                    </button>
                </div>

                <!-- Login Form -->
                <div id="loginTab" class="tab-content active">
                    <form id="loginForm" class="auth-form">
                        <h2><i class="fas fa-lock"></i> Fazer Login</h2>
                        
                        <div class="form-group">
                            <label for="loginUsernameOrEmail">
                                <i class="fas fa-user"></i>
                                Usuário ou Email
                            </label>
                            <input type="text" id="loginUsernameOrEmail" name="usernameOrEmail" required>
                        </div>

                        <div class="form-group">
                            <label for="loginPassword">
                                <i class="fas fa-lock"></i>
                                Senha
                            </label>
                            <div class="password-input">
                                <input type="password" id="loginPassword" name="password" required>
                                <button type="button" class="toggle-password" data-target="loginPassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div id="twoFactorSection" class="form-group" style="display: none;">
                            <label for="twoFactorCode">
                                <i class="fas fa-mobile-alt"></i>
                                Código de Duas Etapas
                            </label>
                            <input type="text" id="twoFactorCode" name="twoFactorCode" 
                                   placeholder="Digite o código do seu app authenticator">
                            <small>Digite o código de 6 dígitos do seu aplicativo autenticador</small>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt"></i>
                            Entrar
                        </button>
                    </form>
                </div>

                <!-- Register Form -->
                <div id="registerTab" class="tab-content">
                    <form id="registerForm" class="auth-form">
                        <h2><i class="fas fa-user-plus"></i> Criar Conta</h2>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">
                                    <i class="fas fa-user"></i>
                                    Nome
                                </label>
                                <input type="text" id="firstName" name="firstName">
                            </div>
                            <div class="form-group">
                                <label for="lastName">
                                    <i class="fas fa-user"></i>
                                    Sobrenome
                                </label>
                                <input type="text" id="lastName" name="lastName">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="username">
                                <i class="fas fa-at"></i>
                                Nome de Usuário
                            </label>
                            <input type="text" id="username" name="username" required>
                        </div>

                        <div class="form-group">
                            <label for="email">
                                <i class="fas fa-envelope"></i>
                                Email
                            </label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="form-group">
                            <label for="password">
                                <i class="fas fa-lock"></i>
                                Senha
                            </label>
                            <div class="password-input">
                                <input type="password" id="password" name="password" required>
                                <button type="button" class="toggle-password" data-target="password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">
                                <i class="fas fa-lock"></i>
                                Confirmar Senha
                            </label>
                            <div class="password-input">
                                <input type="password" id="confirmPassword" name="confirmPassword" required>
                                <button type="button" class="toggle-password" data-target="confirmPassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-user-plus"></i>
                            Criar Conta
                        </button>
                    </form>
                </div>
            </div>

            <!-- Dashboard Section (Hidden by default) -->
            <div id="dashboardSection" class="dashboard-section" style="display: none;">
                <div class="dashboard-header">
                    <h2><i class="fas fa-tachometer-alt"></i> Painel do Usuário</h2>
                    <div class="user-actions">
                        <button id="logoutBtn" class="btn btn-outline">
                            <i class="fas fa-sign-out-alt"></i>
                            Sair
                        </button>
                    </div>
                </div>

                <div class="dashboard-content">
                    <!-- User Info Card -->
                    <div class="card">
                        <div class="card-header">
                            <i class="fas fa-user-circle"></i>
                            Informações Pessoais
                        </div>
                        <div class="card-body" id="userInfo">
                            <!-- User info will be populated here -->
                        </div>
                    </div>

                    <!-- 2FA Management Card -->
                    <div class="card">
                        <div class="card-header">
                            <i class="fas fa-shield-alt"></i>
                            Autenticação de Duas Etapas (2FA)
                        </div>
                        <div class="card-body" id="twoFactorManagement">
                            <!-- 2FA management will be populated here -->
                        </div>
                    </div>
                </div>
            </div>

        </main>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Carregando...</p>
            </div>
        </div>

        <!-- Modal for QR Code and 2FA Setup -->
        <div id="twoFactorModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fas fa-qrcode"></i> Configurar Autenticação de Duas Etapas</h3>
                    <button class="modal-close" onclick="closeTwoFactorModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body" id="twoFactorModalContent">
                    <!-- QR Code and setup instructions will be populated here -->
                </div>
            </div>
        </div>

        <!-- Notification Area -->
        <div id="notifications" class="notifications">
            <!-- Notifications will be added here dynamically -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/app.js"></script>
</body>
</html>
