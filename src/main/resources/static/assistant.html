<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IAM Portfolio — Assistant</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/assistant.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <header class="header">
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
            <h1>IAM Portfolio</h1>
        </div>
        <nav class="header-actions">
            <a href="/" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
        </nav>
    </header>

    <main>
        <section class="assistant-card">
            <h2><i class="fas fa-comments"></i> IAM Assistant</h2>
            <p class="muted">
                Ask anything about the platform's policies (password, SoD,
                JML, GDPR retention, access). Answers are grounded in
                <code>docs/RAG_CORPUS</code> and cite their sources.
            </p>

            <div id="chat" class="chat"></div>

            <form id="assistantForm" class="assistant-form">
                <input type="text" id="question" placeholder="What is the password policy?" required autofocus />
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-paper-plane"></i> Ask
                </button>
            </form>
            <p id="usage" class="muted small"></p>
        </section>
    </main>
</div>
<script src="/js/assistant.js"></script>
</body>
</html>
