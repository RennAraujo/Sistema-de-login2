services:
  postgres:
    image: postgres:16-alpine
    container_name: iam-portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iam}
      POSTGRES_DB: ${POSTGRES_DB:-iam_portfolio}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - iam_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iam} -d ${POSTGRES_DB:-iam_portfolio}"]
      interval: 5s
      timeout: 5s
      retries: 10

  scim-connector:
    build:
      context: ./scim-connector
    container_name: iam-portfolio-scim-connector
    restart: unless-stopped
    environment:
      IAM_BASE_URL: ${SCIM_CONNECTOR_IAM_BASE_URL:-http://host.docker.internal:8080}
      IAM_CLIENT_ID: ${SCIM_CONNECTOR_CLIENT_ID:-demo-client}
      IAM_CLIENT_SECRET: ${SCIM_CONNECTOR_CLIENT_SECRET:-demo-secret}
      SCIM_SHADOW_DB_PATH: /data/connector.db
      PORT: 9000
    ports:
      - "${SCIM_CONNECTOR_PORT:-9000}:9000"
    volumes:
      - scim_connector_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  iam_postgres_data:
    name: iam_portfolio_postgres_data
  scim_connector_data:
    name: iam_portfolio_scim_connector_data
