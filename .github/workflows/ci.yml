name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  java-build-test:
    name: Java build + test (Postgres via Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build + test
        run: mvn -B verify

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  python-test:
    name: Python connector tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scim-connector
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scim-connector/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: pytest
        run: pytest tests/

  docker-build:
    name: Docker images smoke build
    runs-on: ubuntu-latest
    needs: [java-build-test, python-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build iam-portfolio image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: iam-portfolio:ci

      - name: Build scim-connector image
        uses: docker/build-push-action@v6
        with:
          context: ./scim-connector
          push: false
          tags: iam-portfolio-scim-connector:ci
